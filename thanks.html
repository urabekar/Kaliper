<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thank you — Kaliper</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#102433" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  .thanks{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;
    background:linear-gradient(155deg,var(--navy-deep),var(--navy));color:#eef3f7;padding:40px var(--pad)}
  .thanks-inner{max-width:560px}
  .thanks img{height:26px;margin:0 auto 40px}
  .thanks h1{font-family:var(--display);font-weight:600;font-size:clamp(2rem,5vw,3rem);color:#fff;line-height:1.08;margin-bottom:18px}
  .thanks p{color:#bdcad6;font-size:1.08rem;margin-bottom:32px}
</style>
</head>
<body>
  <main class="thanks">
    <div class="thanks-inner">
      <img src="assets/logo-white.svg" alt="Kaliper" />
      <h1>Thank you — your message is in.</h1>
      <p>We've received your inquiry and sent a confirmation to your email. A partner will be in touch shortly.</p>
      <a href="/" class="btn btn-ghost">Back to home</a>
    </div>
  </main>
</body>
</html>
